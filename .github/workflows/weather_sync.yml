name: Automated Weather Alert System

on:
  schedule:
    - cron: '0 2 * * *' # Executes automatically every single day at 7:30 AM IST (2:00 AM UTC)
  workflow_dispatch: # Allows manual trigger button check inside UI dashboard

jobs:
  check-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Weather Diagnostics
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python weather_alert.py
