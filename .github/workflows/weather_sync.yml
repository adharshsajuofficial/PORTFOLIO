name: Automated Weather Alert System

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  check-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Weather Diagnostics
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        # Setting the explicit execution directory root directly on the shell step layer
        working-directory: ./
        run: python weather_alert.py
