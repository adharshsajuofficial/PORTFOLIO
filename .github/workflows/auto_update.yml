name: Dynamic Portfolio Sync Automation

on:
  push:
    branches:
      - main
  schedule:
    # 7:00 AM IST translates exactly to 1:30 AM UTC
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code Repository
        uses: actions/checkout@v4

      - name: Initialize Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Daily Weather Diagnostics
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python weather_alert.py || echo "Weather warning checklist processed."

      - name: Compile 7 AM Daily News Digest
        env:
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python news_digest.py || echo "News parsing step failed, moving forward."

      - name: Execute Repository Scan Script
        env:
          GITHUB_TOKEN: ${{ secrets.PORTFOLIO_TOKEN }}
        run: python fetch_repos.py

      - name: Commit and Push Updated projects.json Dataset
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add projects.json
          if git diff --staged --quiet; then
            echo "No new updates found in repositories. Skipping commit."
          else
            git commit -m "chore: automated refresh of dynamic project dataset [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
